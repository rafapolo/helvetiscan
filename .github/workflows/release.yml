name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: helvetiscan-aarch64-apple-darwin

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            artifact: helvetiscan-x86_64-linux

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: contains(matrix.target, 'musl')
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'musl')
        run: cargo install cargo-zigbuild

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux musl)
        if: contains(matrix.target, 'musl')
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Verify static linking (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          echo "=== Checking file type ==="
          file ${{ matrix.artifact }}
          echo ""
          echo "=== Checking dynamic dependencies ==="
          ldd ${{ matrix.artifact }} || true
          echo ""
          echo "=== Verifying no dynamic executable ==="
          if ldd ${{ matrix.artifact }} 2>&1 | grep -q "not a dynamic executable"; then
            echo "✓ Binary is statically linked"
          else
            echo "✗ Binary has dynamic dependencies!"
            exit 1
          fi

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/helvetiscan ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            helvetiscan-aarch64-apple-darwin
            helvetiscan-x86_64-linux
          generate_release_notes: true
