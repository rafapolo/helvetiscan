name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: helvetiscan-aarch64-apple-darwin

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            artifact: helvetiscan-x86_64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Cache cross binary
        if: contains(matrix.target, 'musl')
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cross
          key: cross-0.2.5

      - name: Install cross
        if: contains(matrix.target, 'musl') && steps.cache-cross.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-musl.tar.gz \
            | tar xz -C ~/.cargo/bin cross

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux musl)
        if: contains(matrix.target, 'musl')
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/helvetiscan ${{ matrix.artifact }}

      - name: Verify static linking (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          echo "=== Checking file type ==="
          file ${{ matrix.artifact }}
          echo ""
          echo "=== Checking dynamic dependencies ==="
          ldd ${{ matrix.artifact }} || true
          echo ""
          echo "=== Verifying no dynamic executable ==="
          if ldd ${{ matrix.artifact }} 2>&1 | grep -qE "not a dynamic executable|statically linked"; then
            echo "✓ Binary is statically linked"
          else
            echo "✗ Binary has dynamic dependencies!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            helvetiscan-aarch64-apple-darwin
            helvetiscan-x86_64-unknown-linux-musl
          generate_release_notes: true
